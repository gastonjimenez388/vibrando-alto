<section id="contacto">
    <div class="contact-container">
        <h2>¿Quieres ser parte de Vibrando Alto?</h2>
        <p>Déjanos tus datos y nos pondremos en contacto contigo para iniciar tu camino emprendedor.</p>
        <form class="contact-form">
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo electrónico" required>

            <textarea placeholder="Cuéntanos qué te motiva a emprender" rows="4"></textarea>
            <button type="submit" class="submit-btn">Enviar Solicitud</button>
        </form>
    </div>
</section>

        background-color: #333;
        color: white;
        padding: 12px;
