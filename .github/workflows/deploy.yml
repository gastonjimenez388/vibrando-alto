name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: peaceiris/gh-pages-v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
